<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <ul id="lista">
    </ul>

    <input type="text" id="buscador">

    <ul id="lista2"></ul>



    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        setTimeout(()=>{
            console.log("datos recibidos")
        }, 10000);

        function obtenerEventos(callback){
            setTimeout(() =>{
                callback([
                    {titulo:"JS"},
                    {titulo:"Symfony"}
                ]);
            },1000);
        }

        obtenerEventos(function(eventos){
            $(`#lista`).html("");

            eventos.forEach(e=>{
                $(`#lista`).append(`<li>${e.titulo}</li>`);
            });
        });

 
        $.get(`eventos.json`, function(data){
            data.forEach(e=>{
                $(`#lista`).append(`<li>${e.titulo}</li>`);
            });
        });




            $(`#buscador`).on(`input`, function(){
                let texto=$(this).val().toLowerCase();

                $.get(`eventos.json`,function(data){
                    let filtrados=data.filter(e=>e.titulo.toLowerCase().includes(texto));

                    $(`#lista2`).html("");
                    

                    if(texto){filtrados.forEach(e=>{$(`#lista2`).append(`<li>${e.titulo}</li>`);});}

                    if(texto.toLowerCase().includes(filtrados)){$(`#lista2`).append(`<p>No se encontraron resultados</p>`);}

/*                     filtrados.forEach(e=>{
                            $(`#lista2`).append(`<li>${e.titulo}</li>`);
                    }); */
                });
            });

    </script>
</body>
</html>
